<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, select, button { margin: 5px 0; padding: 8px; display: block; }
        .hint {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        .hint strong { color: #d63384; }
        #error { color: red; margin-top: 10px; }
        .success { color: green; }
    </style>
</head>
<body>

<h2>Регистрация</h2>

<!-- ПОДСКАЗКА С ГОТОВЫМИ ДАННЫМИ -->
<div class="hint">
    <strong>📌 Демо-данные для входа:</strong><br>
    Логин: <strong>user01</strong><br>
    Пароль: <strong>Pass!123</strong><br>
    <span style="font-size:12px; color:#666;">(Фамилия: Иванов, Имя: Иван, Возраст: 25, Пол: Мужской)</span>
</div>

<input id="surname" placeholder="Фамилия" value="Иванов"><br>
<input id="name" placeholder="Имя" value="Иван"><br>
<input id="age" type="number" placeholder="Возраст" value="25"><br>
<select id="gender">
    <option value="">Выберите пол</option>
    <option value="male" selected>Мужской</option>
    <option value="female">Женский</option>
</select><br>
<input id="login" placeholder="Логин" value="user01"><br>
<input id="password" type="password" placeholder="Пароль" value="Pass!123"><br>

<button id="registerBtn">Зарегестрироваться</button>
<button id="loginBtn">Войти</button>

<div id="error"></div>

<script>
function validSurname(v) {
    return /^[А-ЯЁ][а-яё]+$/.test(v);
}
function validName(v) {
    return /^[А-ЯЁ][а-яё]+$/.test(v);
}
function validAge(v) {
    return v >= 0 && v <= 999;
}
function validLogin(v) {
    return /^[A-Za-z]{4}\d{2}$/.test(v);
}
function validPassword(v) {
    return v.length <= 8 && /[A-Za-z]/.test(v) && /\d/.test(v) && /[.,!?;:@#$%^&*]/.test(v);
}

document.getElementById("registerBtn").onclick = () => {
    const surname = document.getElementById("surname").value;
    const nameVal = document.getElementById("name").value;
    const ageVal = document.getElementById("age").value;
    const genderVal = document.getElementById("gender").value;
    const loginVal = document.getElementById("login").value;
    const passVal = document.getElementById("password").value;
    const error = document.getElementById("error");

    if (!surname || !nameVal || !ageVal || !genderVal || !loginVal || !passVal) {
        error.textContent = "Все поля должны быть заполнены.";
        error.className = "";
        return;
    }
    if (!validSurname(surname)) {
        error.textContent = "Фамилия — первая заглавная, кириллица.";
        return;
    }
    if (!validName(nameVal)) {
        error.textContent = "Имя — первая заглавная, кириллица.";
        return;
    }
    if (!validAge(+ageVal)) {
        error.textContent = "Возраст 0–999.";
        return;
    }
    if (!validLogin(loginVal)) {
        error.textContent = "Логин: 4 буквы + 2 цифры.";
        return;
    }
    if (!validPassword(passVal)) {
        error.textContent = "Пароль: до 8 символов, буквы, цифры, знаки.";
        return;
    }

    const user = { 
        surname, 
        name: nameVal, 
        age: +ageVal, 
        gender: genderVal,
        login: loginVal, 
        pass: passVal 
    };
    localStorage.setItem("plannerUser", JSON.stringify(user));
    error.textContent = "✅ Регистрация успешна! Теперь нажмите 'Войти'.";
    error.className = "success";
};

document.getElementById("loginBtn").onclick = () => {
    const loginVal = document.getElementById("login").value;
    const passVal = document.getElementById("password").value;
    const error = document.getElementById("error");
    
    const user = JSON.parse(localStorage.getItem("plannerUser"));
    if (!user) {
        error.textContent = "Сначала зарегистрируйтесь.";
        error.className = "";
        return;
    }
    
    if (user.login !== loginVal || user.pass !== passVal) {
        error.textContent = "Неверный логин или пароль.";
        error.className = "";
        return;
    }
    
    window.location.href = "31.html";
};
</script>

</body>
</html>
